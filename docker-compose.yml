services:
  postgres:
    image: postgres:16-alpine
    container_name: cognitree-db
    environment:
      POSTGRES_USER: cognitree
      POSTGRES_PASSWORD: cognitree
      POSTGRES_DB: cognitree
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognitree"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
